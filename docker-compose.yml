services:
  touchlabs-site:
    image: nginx:alpine
    container_name: touchlabs-site
    ports:
      - "8084:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    image: php:8.2-fpm-alpine
    container_name: touchlabs-php
    volumes:
      - ./api:/var/www/api
    env_file:
      - ./api/.env
    restart: unless-stopped
